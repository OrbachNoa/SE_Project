[pytest]
# Register custom markers so pytest doesn't warn about them.
markers =
    performance: tests that measure execution time (SCRUM-22, SRS §5.1)

# Where pytest looks for tests
testpaths = tests

# Default options
addopts = --strict-markers --ignore=tests/Test_Behavioural.py --ignore=tests/Test_Checkers.py --ignore=tests/Test_Performance.py --ignore=tests/Test_Scheduler_Engine.py --ignore=tests/Test_Integration.py

# File name patterns for test discovery
python_files = test_*.py Test_*.py *_test.py

# Add current directory to pythonpath so it can find 'src'
pythonpath = .