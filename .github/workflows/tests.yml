name: Run Tests

# When does this workflow run?
on:
  push:
    branches: [ "**" ]      # Run on push to ANY branch
  pull_request:
    branches: [ main ]      # Run on PRs targeting main

jobs:
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest

    strategy:
      # Don't stop other jobs if one Python version fails
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      # Step 1 — Get the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # If requirements.txt exists, install from it
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # If pyproject.toml exists, install the package in editable mode
          if [ -f pyproject.toml ]; then pip install -e .; fi
          # Always install pytest and coverage
          pip install pytest pytest-cov

      # Step 4 — Run the FAST tests (everything except performance tests)
      # Performance tests run separately so a slow run doesn't block PR feedback.
      - name: Run unit, integration & behavioural tests
        run: |
          pytest tests/ -m "not performance" -v --tb=short

      # Step 5 — Run performance tests (only on Python 3.12 to save CI time)
      # Performance tests must complete within 30 seconds per SRS §5.1.
      - name: Run performance tests
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ -m performance -v --tb=short

      # Step 6 — Generate coverage report (only on Python 3.12)
      - name: Generate coverage report
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ -m "not performance" --cov=src --cov-report=term-missing --cov-report=xml || true

      # Step 7 — Upload coverage XML as a build artefact (Python 3.12 only)
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore