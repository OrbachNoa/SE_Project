name: Run Tests

on:
  push:
    branches: [ "**" ] 
  pull_request:
    branches: [ "**" ] 

jobs:
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest

    strategy:
      # Don't stop other jobs if one Python version fails
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      # Step 1 — Get the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      # Step 3.5 — Run Linters and Static Code Analysis
      - name: Run flake8 linter
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Step 4 — Run logic tests (fast, no GUI libraries required)
      - name: Run logic tests
        run: |
          pytest tests/ --ignore=tests/Test_Workers.py --ignore=tests/Test_Screen_Router.py --ignore=tests/Test_GUI.py --ignore=tests/Test_GUI_Integration.py --ignore=tests/Test_App_Controller.py -m "not performance" -v --tb=short

      # Step 4.5 — Install Headless GUI Dependencies (only needed for GUI tests)
      # - name: Install Headless GUI Dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libegl1-mesa libgl1-mesa-glx libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-shape0

      # Step 4.6 — Run GUI tests (using offscreen platform buffer)
      # - name: Run GUI tests
      #   env:
      #     QT_QPA_PLATFORM: offscreen
      #   run: |
      #     pytest tests/Test_Workers.py tests/Test_Screen_Router.py tests/Test_GUI.py tests/Test_GUI_Integration.py -v --tb=short

      # Step 5 — Run performance tests (only on Pull Requests on Python 3.12 to save CI time/cost)
      # Performance tests must complete within 30 seconds per SRS §5.1.
      - name: Run performance tests
        if: matrix.python-version == '3.12' && github.event_name == 'pull_request'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest tests/ -m performance -v --tb=short

      # Step 6 — Generate coverage report (only on Python 3.12)
      - name: Generate coverage report
        if: matrix.python-version == '3.12'
        continue-on-error: true
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest tests/ -m "not performance" --cov=src --cov-report=term-missing --cov-report=xml

      # Step 7 — Upload coverage XML as a build artefact (Python 3.12 only)
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore